<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactuEco - Login</title>
    <link href="./output.css" rel="stylesheet" />
  </head>

  <body class="bg-green-100 min-h-screen flex flex-col items-center justify-center px-4">
    <img src="/src/views/img/Cielo_Grande_Eco_transparente.png" alt="Logo de FactuEco" class="w-40 sm:w-52 md:w-64 mb-4">

    <h1 class="text-center text-3xl font-bold">FactuEco</h1>
    <h2 class="text-center text-xl font-semibold mt-2">Bienvenidos</h2>

    <div class="w-full max-w-sm bg-green-300 p-6 rounded-lg shadow-md mt-6 flex flex-col items-center">

      <div class="flex items-center w-full bg-white border border-gray-300 rounded-md px-3 py-2 mb-4">
        <img src="/src/views/img/gmail.png" class="w-5 h-5 mr-3" alt="gmail icon">
        <input type="email" placeholder="Correo electrónico"class="w-full outline-none text-sm sm:text-base">
      </div>
      <div class="flex items-center w-full bg-white border border-gray-300 rounded-md px-3 py-2 mb-4">
        <img src="/src/views/img/contraseña.png" class="w-5 h-5 mr-3" alt="password icon">
        <input type="password" placeholder="Contraseña" class="w-full outline-none text-sm sm:text-base">
      </div>
      <a href="#" class="text-sm text-gray-700 hover:underline mb-4">Ayuda</a>
      <button class="w-full bg-green-500 text-white py-2 rounded-md hover:bg-green-700 transition">Iniciar Sesión</button>
    </div>
  </body>
</html>
